<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logfire Browser RUM Smoke</title>
    <style>
      :root {
        color: #17202a;
        background: #f6f8fb;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        display: grid;
        gap: 24px;
        margin: 0 auto;
        max-width: 920px;
        padding: 40px 20px;
      }

      header {
        display: grid;
        gap: 12px;
      }

      h1 {
        font-size: clamp(32px, 5vw, 56px);
        line-height: 1;
        margin: 0;
      }

      p {
        margin: 0;
      }

      .hero {
        background: #ffffff;
        border: 1px solid #d7dee8;
        border-radius: 8px;
        display: grid;
        gap: 16px;
        min-height: 280px;
        padding: 32px;
      }

      .panel {
        background: #ffffff;
        border: 1px solid #d7dee8;
        border-radius: 8px;
        display: grid;
        gap: 16px;
        padding: 20px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button {
        background: #1f6feb;
        border: 0;
        border-radius: 6px;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 650;
        min-height: 40px;
        padding: 8px 14px;
      }

      button.secondary {
        background: #425466;
      }

      button.danger {
        background: #b42318;
      }

      dl {
        display: grid;
        gap: 8px 16px;
        grid-template-columns: max-content 1fr;
        margin: 0;
      }

      dt {
        color: #58687a;
        font-weight: 650;
      }

      dd {
        margin: 0;
        overflow-wrap: anywhere;
      }

      .shift-banner {
        background: #fff4cc;
        border: 1px solid #e6bc2f;
        border-radius: 8px;
        color: #493900;
        padding: 18px;
      }
    </style>
  </head>
  <body>
    <main id="app">
      <header class="hero">
        <p>Logfire browser SDK</p>
        <h1>RUM smoke page</h1>
        <p>Use this page to generate browser spans and Web Vitals from a real tab.</p>
      </header>

      <section class="panel">
        <dl>
          <dt>Session</dt>
          <dd id="session-id">pending</dd>
          <dt>Status</dt>
          <dd id="status" role="status" aria-live="polite">ready</dd>
        </dl>
      </section>

      <section class="panel">
        <div class="actions">
          <button type="button" data-action="fetch">Fetch</button>
          <button type="button" class="secondary" data-action="work">Work span</button>
          <button type="button" class="secondary" data-action="shift">Layout shift</button>
          <button type="button" class="danger" data-action="error">Report error</button>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
